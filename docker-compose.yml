services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: unicornio
      POSTGRES_PASSWORD: unicornio
      POSTGRES_DB: unicornio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unicornio"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://unicornio:unicornio@db:5432/unicornio
      CORS_ORIGINS: "http://localhost:5173"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

volumes:
  postgres_data:
