version: '3.8'
services:
  backend:
    image: python:3.11-slim
    working_dir: /app
    volumes: [./backend:/app]
    ports: ["8000:8000"]
    command: sh -c "pip install -r requirements/dev.txt && uvicorn app.main:app --host 0.0.0.0"
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: unicornio
      POSTGRES_DB: unicornio
    ports: ["5432:5432"]
